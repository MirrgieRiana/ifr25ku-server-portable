name: Maven Publish

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: maven-publish

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: main

      - uses: actions/checkout@v4
        with:
          ref: maven
          path: maven

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish
        run: |
          mkdir -p main/build/maven-repo maven/maven
          rsync -a --delete maven/maven/ main/build/maven-repo/
          (
            cd main
            ./gradlew publish
          )
          rsync -a --delete main/build/maven-repo/ maven/maven/

      - name: Push to maven branch
        run: |
          cd maven
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$VERSION ($(git rev-parse -C ../main --short "$GITHUB_SHA"))"
          git push origin maven
